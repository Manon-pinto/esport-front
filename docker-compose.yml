services:

  # ── API Express (back-end) — accessible sur :3000 ─────────────────────────
  backend:
    build:
      context: ./esport-back
      dockerfile: Dockerfile
    container_name: proleague-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/proleague
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
    depends_on:
      - mongodb
    restart: unless-stopped

  # ── Front-end Next.js — accessible sur :80 ────────────────────────────────
  frontend:
    build:
      context: ./esport-front
      dockerfile: Dockerfile
    container_name: proleague-frontend
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://${VPS_IP}:3000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Base de données MongoDB (interne uniquement) ───────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: proleague-mongodb
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # ── Interface d'admin MongoDB — accessible sur :8081 ──────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: proleague-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD}
    depends_on:
      - mongodb
    restart: unless-stopped

  # ── Visualisation des logs — accessible sur :8888 ─────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: proleague-dozzle
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ── Gestion visuelle des conteneurs — accessible sur :9000 ────────────────
  portainer:
    image: portainer/portainer-ce:lts
    container_name: proleague-portainer
    command: --http-enabled
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  portainer_data:
